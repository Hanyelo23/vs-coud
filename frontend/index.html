<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Pueblía</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f7fb;
    }

    .header {
      background: #3a7bd5;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .search {
      margin: 15px;
      padding: 10px;
      background: white;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    .section {
      margin: 15px;
    }

    .section h2 {
      margin-bottom: 10px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card img {
      width: 70px;
      height: 70px;
      border-radius: 10px;
    }

    .title {
      font-weight: bold;
    }

    .bottom {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      border-top: 1px solid #ddd;
      display: flex;
      justify-content: space-around;
      padding: 10px;
    }
  </style>
</head>

<body>

  <div class="header">Pueblía</div>

  <div class="search">🔍 Empieza tu búsqueda...</div>

  <div class="section">
    <h2>Populares</h2>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1601924638867-3ec2e5f4d8a5">
      <div>
        <div class="title">Solemio</div>
        ⭐ 4.5 · 25-30 min
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1594007654729-407eedc4be65">
      <div>
        <div class="title">Pizzotas</div>
        ⭐ 4.6 · 20-25 min
      </div>
    </div>

  </div>

  <div class="bottom">
    🏠 Inicio
    🛒 Carrito
    📦 Órdenes
    👤 Perfil
  </div>

</body>
</html>
